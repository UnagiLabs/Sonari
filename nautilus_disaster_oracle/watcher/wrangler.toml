name = "sonari-oracle-watcher"
main = "src/worker.ts"
compatibility_date = "2026-05-16"

[triggers]
crons = ["*/5 * * * *"]

[[queues.producers]]
queue = "sonari-runner-jobs"
binding = "RUNNER_JOBS"

[[queues.consumers]]
queue = "sonari-runner-jobs"
max_batch_size = 1
max_concurrency = 1
max_retries = 3
dead_letter_queue = "sonari-runner-jobs-dlq"
retry_delay = 60

[[d1_databases]]
binding = "EARTHQUAKE_EVENTS"
database_name = "sonari-oracle-watcher-local"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
