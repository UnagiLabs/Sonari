name = "sonari-oracle-watcher"
main = "src/worker.ts"
compatibility_date = "2026-05-16"

[vars]
MANUAL_SUBMIT_TOKEN = "local-dev-token"
ORACLE_SIDECAR_URL = "http://127.0.0.1:8789"
RELAYER_TARGET = "0x123::disaster_oracle::submit_payload_v1"
RELAYER_REGISTRY = "0x456"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "EARTHQUAKE_EVENTS"
database_name = "sonari-oracle-watcher-local"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
