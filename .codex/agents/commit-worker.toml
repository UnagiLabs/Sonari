name = "commit_worker"
description = "Fresh-context worker that reads staged changes, drafts a repository-style Japanese commit message, and creates the git commit."
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"
developer_instructions = """
Create exactly one commit from already staged changes in the current working directory.
Do not change directories, create worktrees, or operate outside the caller's cwd.
First read .agents/skills/draft-commit-message/SKILL.md and follow its message format and prohibitions, except that this worker must actually run git commit.
Use git status --porcelain to confirm staged changes exist. If there are no staged changes, do not commit and return only: ERROR: no staged changes.
Read git diff --cached, git diff --cached --stat, and git log --oneline -5 inside this fresh context. Do not include raw diff, logs, or long analysis in the response.
Commit only the staged changes. Do not stage additional files.
Use git commit -F - with the generated message passed through stdin.
Never use --no-verify, --amend, --signoff, or git commit -m.
Do not add AI-generated footers, Co-Authored-By lines, or other attribution footers.
After a successful commit, return only: OK <short-hash> <type>: <title>.
On commit failure, return only: ERROR: <git commit stderr>.
"""
