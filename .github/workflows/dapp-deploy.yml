name: dapp Deploy

# dapp（Next.js）か実行時に使う packages/proof-core の実装、注入元 contracts/Published.toml が
# main に入ると、OpenNext で Cloudflare Workers へ自動デプロイする。依存 lockfile だけの変更は
# 手動 dispatch で反映し、不要なデプロイを抑える。
# パターンは .github/workflows/affected-cells-proof-worker-deploy.yml に倣う。
# 通常の worker と違い、dapp は OpenNext のため `wrangler deploy` ではなく
# `opennextjs-cloudflare deploy`（= pnpm --filter @sonari/dapp deploy）を使う。
on:
  push:
    branches:
      - main
    paths:
      - dapp/**
      - packages/proof-core/package.json
      - packages/proof-core/tsconfig.json
      - packages/proof-core/src/**
      - contracts/Published.toml
      - .github/workflows/dapp-deploy.yml
  workflow_dispatch:

# Cloudflare は API トークン認証で OIDC 不要。AWS 版の id-token: write は持たせない。
permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy dapp to Cloudflare
    runs-on: ubuntu-latest
    # environment 配下の secret として CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID を参照する。
    # secret は GitHub の Settings で別途登録する（本リポジトリには平文を置かない）。
    environment: cloudflare-dapp-worker
    timeout-minutes: 30
    # 同一 Worker への同時デプロイを直列化する。新しい main の deploy を優先する。
    concurrency:
      group: dapp-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Enable pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.27.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # dapp は @sonari/proof-core（workspace:*）を import し、next.config.ts は
      # contracts/Published.toml を読む。どちらも repo 全体の checkout と workspace 解決を前提にする。
      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "Missing required GitHub Environment secret: CLOUDFLARE_API_TOKEN"
            echo "Set it in environment: cloudflare-dapp-worker"
            exit 1
          fi

          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "Missing required GitHub Environment secret: CLOUDFLARE_ACCOUNT_ID"
            echo "Set it in environment: cloudflare-dapp-worker"
            exit 1
          fi

      - name: Validate World ID action
        env:
          NEXT_PUBLIC_WORLD_ID_ACTION: ${{ vars.NEXT_PUBLIC_WORLD_ID_ACTION }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${NEXT_PUBLIC_WORLD_ID_ACTION:-}" =~ ^sonari_membership_register_v[0-9]+$ ]]; then
            echo "NEXT_PUBLIC_WORLD_ID_ACTION must match sonari_membership_register_v<N>"
            echo "Set it in environment: cloudflare-dapp-worker"
            exit 1
          fi

      - name: Resolve Sonari contract ids from Published.toml
        env:
          SONARI_SUI_NETWORK: ${{ vars.SONARI_SUI_NETWORK }}
          SUI_RPC_URL: ${{ vars.SONARI_SUI_RPC_URL }}
        shell: bash
        run: |
          set -euo pipefail
          resolver_args=(
            scripts/resolve_published_contract_ids.ts
            --network "${SONARI_SUI_NETWORK:-testnet}"
          )
          if [[ -n "${SUI_RPC_URL:-}" ]]; then
            resolver_args+=(--rpc-url "$SUI_RPC_URL")
          fi
          pnpm tsx "${resolver_args[@]}"

      # `deploy` script は `opennextjs-cloudflare build && opennextjs-cloudflare deploy`。
      # 前段の build が型検査も兼ねる（型エラーがあればここで失敗し deploy に進まない）。
      # よって独立した `next build` step は冗長なため置かない。
      # PR CI で dapp test を実行済みの前提にし、main deploy では再実行しない。
      #
      # `pnpm deploy` は pnpm の予約コマンド（パッケージのバンドル）なので、必ず `run` を付けて
      # package.json の deploy script を呼ぶ（`run` を省くと別物が走り失敗する）。
      #
      # NEXT_PUBLIC_* はビルド時にバンドルへ焼き込まれる公開値。
      # 未設定なら空文字が焼き込まれ、地図・World ID・各 worker 連携が無効のまま表示だけされる。
      # 秘密ではないので secrets ではなく vars を使う（どのみちブラウザに出る）。
      #
      # vars の出所は 2 種類に分ける（単一情報源化）:
      #   - repo-level Variables（SONARI_*）= dapp / Cloudflare worker / AWS runner で共有する値。
      #     1 箇所更新すれば全デプロイ先へ反映される。ここでは NEXT_PUBLIC_* 名へ写し替えて渡す。
      #   - environment-level Variables（cloudflare-dapp-worker）= dapp 固有の値
      #     （Google Maps key / World ID app_id）。
      # NEXT_PUBLIC_SONARI_MEMBERSHIP_PACKAGE_ID は next.config が Published.toml から自動注入するので、env 変数としては渡さない。
      # NEXT_PUBLIC_SONARI_FUNDING_PACKAGE_ID は vars を優先し、未設定時は同じ
      # next.config の Published.toml フォールバックを使う。
      #
      # アプリ secret（WORLD_ID_RP_SIGNING_KEY）は CI に置かない。`wrangler secret put` で
      # Cloudflare 側に別管理する。CI が扱うのは Cloudflare API token と account id、公開値のみ。
      - name: Build and deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 共有の単一情報源（repo-level Variables）。
          NEXT_PUBLIC_SUI_NETWORK: ${{ vars.SONARI_SUI_NETWORK }}
          NEXT_PUBLIC_SONARI_RESIDENCE_PROOF_WORKER_URL: ${{ vars.SONARI_RESIDENCE_PROOF_WORKER_URL }}
          NEXT_PUBLIC_SONARI_AFFECTED_PROOF_WORKER_URL: ${{ vars.SONARI_AFFECTED_PROOF_WORKER_URL }}
          NEXT_PUBLIC_SONARI_IDENTITY_SUBMIT_URL: ${{ vars.SONARI_IDENTITY_SUBMIT_URL }}
          NEXT_PUBLIC_SONARI_IDENTITY_STATUS_URL: ${{ vars.SONARI_IDENTITY_STATUS_URL }}
          NEXT_PUBLIC_WORLD_ID_RP_ID: ${{ vars.SONARI_WORLD_ID_RP_ID }}
          NEXT_PUBLIC_WORLD_ID_ENVIRONMENT: ${{ vars.SONARI_WORLD_ID_ENVIRONMENT }}
          NEXT_PUBLIC_WORLD_ID_ACTION: ${{ vars.NEXT_PUBLIC_WORLD_ID_ACTION }}
          NEXT_PUBLIC_SONARI_FUNDING_PACKAGE_ID: ${{ vars.SONARI_FUNDING_PACKAGE_ID }}
          # pause_state / pool / category_registry は packageID 起点で
          # admin::GenesisObjectCreated イベントから dapp が導出するため env では渡さない。
          # USDC の coin type は Sui 上で一意に決まる定数のため dapp/app/donate/donate-config.ts に持つ。
          # dapp 固有（environment-level Variables）。
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_WORLD_ID_APP_ID: ${{ vars.NEXT_PUBLIC_WORLD_ID_APP_ID }}
        shell: bash
        run: pnpm --filter @sonari/dapp run deploy
