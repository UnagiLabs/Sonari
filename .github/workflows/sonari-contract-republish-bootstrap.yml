name: Sonari Contract Post-Publish Bootstrap

on:
  push:
    branches:
      - main
    paths:
      - contracts/Published.toml
  workflow_dispatch:
    inputs:
      network:
        description: Sui network to update
        required: true
        default: testnet
        type: choice
        options:
          - testnet
          - mainnet

permissions:
  contents: read

jobs:
  bootstrap:
    name: Update residence root on published contract
    runs-on: [self-hosted, linux, x64, manji]
    environment: aws-sonari-verifier-runner-dev
    timeout-minutes: 30
    concurrency:
      group: sonari-contract-post-publish-bootstrap-${{ inputs.network || vars.SONARI_SUI_NETWORK || 'testnet' }}
      cancel-in-progress: false
    env:
      SONARI_SUI_NETWORK: ${{ inputs.network || vars.SONARI_SUI_NETWORK || 'testnet' }}
      SONARI_RESIDENCE_ROOT: ${{ vars.SONARI_RESIDENCE_ROOT }}
      SONARI_RESIDENCE_SOURCE_HASH: ${{ vars.SONARI_RESIDENCE_SOURCE_HASH }}
      SONARI_GEO_RESOLUTION: ${{ vars.SONARI_GEO_RESOLUTION }}
      SONARI_RESIDENCE_ALLOWLIST_VERSION: "1"
      SONARI_DEV_ADMIN_PRIVATE_KEY: ${{ secrets.SONARI_DEV_ADMIN_PRIVATE_KEY }}
      SUI_CLI_URL: https://github.com/MystenLabs/sui/releases/download/testnet-v1.71.1/sui-testnet-v1.71.1-ubuntu-x86_64.tgz
      SUI_CLI_SHA256: ca6bc791596d5def88500b653b5db718e72dd0d2b58039ad118f74ef9e6761a5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Enable pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.27.0 --activate

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Install pinned Sui CLI
        shell: bash
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/sonari-bin"
          cache_dir="$HOME/.cache/sonari/cli-artifacts/sui/$SUI_CLI_SHA256"
          download_path="$cache_dir/download"
          extract_dir="$RUNNER_TEMP/sui-extract"

          mkdir -p "$install_dir" "$cache_dir" "$extract_dir"
          if [[ ! -f "$download_path" ]]; then
            curl -fsSL "$SUI_CLI_URL" -o "$download_path"
          fi
          printf '%s  %s\n' "$SUI_CLI_SHA256" "$download_path" | sha256sum -c -
          tar -xzf "$download_path" -C "$extract_dir"
          source_path="$(find "$extract_dir" -type f -name sui | head -n 1)"
          if [[ -z "$source_path" || ! -f "$source_path" ]]; then
            echo "Unable to find sui in downloaded Sui CLI artifact" >&2
            exit 1
          fi
          install -m 0755 "$source_path" "$install_dir/sui"
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/sui" --version

      - name: Prepare admin Sui client config
        shell: bash
        env:
          SUI_RPC_URL: ${{ vars.SONARI_SUI_RPC_URL }}
        run: |
          set -euo pipefail
          set +x
          if [[ -z "${SONARI_DEV_ADMIN_PRIVATE_KEY:-}" ]]; then
            echo "SONARI_DEV_ADMIN_PRIVATE_KEY secret is required for contract post-publish bootstrap" >&2
            exit 1
          fi
          echo "::add-mask::${SONARI_DEV_ADMIN_PRIVATE_KEY}"

          case "$SONARI_SUI_NETWORK" in
            mainnet)
              rpc_url="${SUI_RPC_URL:-https://fullnode.mainnet.sui.io:443}"
              ;;
            testnet)
              rpc_url="${SUI_RPC_URL:-https://fullnode.testnet.sui.io:443}"
              ;;
            *)
              echo "unsupported SONARI_SUI_NETWORK: $SONARI_SUI_NETWORK" >&2
              exit 1
              ;;
          esac

          admin_dir="$RUNNER_TEMP/sui-admin"
          rm -rf "$admin_dir"
          mkdir -p "$admin_dir"
          client_config="$admin_dir/client.yaml"
          admin_alias="sonari-post-publish-admin-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          export SUI_CONFIG_DIR="$admin_dir"
          sui client --yes new-address ed25519 sonari-bootstrap --quiet >/dev/null
          sui client new-env --alias "$SONARI_SUI_NETWORK" --rpc "$rpc_url"
          import_json="$(sui keytool import \
            "$SONARI_DEV_ADMIN_PRIVATE_KEY" ed25519 --alias "$admin_alias" --json)"
          admin_address="$(SUI_IMPORT_JSON="$import_json" node --input-type=module <<'NODE'
          const parsed = JSON.parse(process.env.SUI_IMPORT_JSON ?? "{}");
          const address = parsed.suiAddress ?? parsed.address;
          if (typeof address !== "string" || !/^0x[0-9a-fA-F]+$/.test(address)) {
            process.stderr.write("sui keytool import did not return a Sui address\n");
            process.exit(1);
          }
          process.stdout.write(address);
          NODE
          )"
          sui client switch --env "$SONARI_SUI_NETWORK" --address "$admin_address" --quiet
          echo "SONARI_ADMIN_SUI_CLIENT_CONFIG=$client_config" >> "$GITHUB_ENV"

      - name: Resolve Sonari contract ids from Published.toml
        shell: bash
        env:
          SUI_RPC_URL: ${{ vars.SONARI_SUI_RPC_URL }}
        run: |
          set -euo pipefail
          resolver_args=(
            scripts/resolve_published_contract_ids.ts
            --network "$SONARI_SUI_NETWORK"
          )
          if [[ -n "${SUI_RPC_URL:-}" ]]; then
            resolver_args+=(--rpc-url "$SUI_RPC_URL")
          fi
          pnpm tsx "${resolver_args[@]}"

      - name: Validate residence root update inputs
        shell: bash
        run: |
          set -euo pipefail
          hex32='^0x[0-9a-fA-F]{64}$'
          object_id='^0x[0-9a-fA-F]{64}$'
          integer='^[0-9]+$'

          if [[ ! "${SONARI_RESIDENCE_ROOT:-}" =~ $hex32 ]]; then
            echo "SONARI_RESIDENCE_ROOT must be 32-byte 0x-prefixed hex" >&2
            exit 1
          fi
          if [[ ! "${SONARI_RESIDENCE_SOURCE_HASH:-}" =~ $hex32 ]]; then
            echo "SONARI_RESIDENCE_SOURCE_HASH must be 32-byte 0x-prefixed hex" >&2
            exit 1
          fi
          if [[ ! "${SONARI_GEO_RESOLUTION:-}" =~ $integer ]]; then
            echo "SONARI_GEO_RESOLUTION must be an integer" >&2
            exit 1
          fi
          if [[ ! "${SONARI_RESIDENCE_ALLOWLIST_VERSION:-}" =~ $integer ]]; then
            echo "SONARI_RESIDENCE_ALLOWLIST_VERSION must be an integer" >&2
            exit 1
          fi
          if [[ ! "${SONARI_IDENTITY_PACKAGE_ID:-}" =~ $object_id ]]; then
            echo "SONARI_IDENTITY_PACKAGE_ID must be a 32-byte 0x object id" >&2
            exit 1
          fi
          if [[ ! "${SONARI_ADMIN_CAP_ID:-}" =~ $object_id ]]; then
            echo "SONARI_ADMIN_CAP_ID must be a 32-byte 0x object id" >&2
            exit 1
          fi
          if [[ ! "${SONARI_ALLOWED_RESIDENCE_CELL_REGISTRY_ID:-}" =~ $object_id ]]; then
            echo "SONARI_ALLOWED_RESIDENCE_CELL_REGISTRY_ID must be a 32-byte 0x object id" >&2
            exit 1
          fi

      - name: Update AllowedResidenceCellRegistry root
        shell: bash
        run: |
          set -euo pipefail
          update_json="$(sui \
            client \
            --client.config "$SONARI_ADMIN_SUI_CLIENT_CONFIG" \
            --client.env "$SONARI_SUI_NETWORK" \
            call \
            --package "$SONARI_IDENTITY_PACKAGE_ID" \
            --module admin \
            --function update_allowed_residence_cell_root \
            --args \
              "$SONARI_ADMIN_CAP_ID" \
              "$SONARI_ALLOWED_RESIDENCE_CELL_REGISTRY_ID" \
              "$SONARI_RESIDENCE_ROOT" \
              "$SONARI_GEO_RESOLUTION" \
              "$SONARI_RESIDENCE_ALLOWLIST_VERSION" \
              "$SONARI_RESIDENCE_SOURCE_HASH" \
            --gas-budget 100000000 \
            --json)"

          UPDATE_RESULT_JSON="$update_json" node --input-type=module <<'NODE'
          const parsed = JSON.parse(process.env.UPDATE_RESULT_JSON ?? "{}");
          const expectedRegistryId = process.env.SONARI_ALLOWED_RESIDENCE_CELL_REGISTRY_ID;
          const events = Array.isArray(parsed.events) ? parsed.events : [];
          const matched = events.some((event) => {
            if (event === null || typeof event !== "object") {
              return false;
            }
            const type = event.type;
            const parsedJson = event.parsedJson;
            return (
              typeof type === "string" &&
              type.includes("::allowed_residence_cell::AllowedResidenceCellRootUpdated") &&
              parsedJson !== null &&
              typeof parsedJson === "object" &&
              parsedJson.registry_id === expectedRegistryId
            );
          });
          if (!matched) {
            process.stderr.write(
              "admin::update_allowed_residence_cell_root did not emit the expected registry_id\n",
            );
            process.exit(1);
          }
          NODE
