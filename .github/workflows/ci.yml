name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    name: pnpm and Cargo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.27.0 --activate

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and lint
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test TypeScript
        run: pnpm test

      - name: Test Rust TEE
        run: cargo test --manifest-path nautilus/verifiers/disaster/tee/Cargo.toml
