name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.json
      - tsconfig.base.json
      - biome.json
      - vitest.config.ts
      - Cargo.toml
      - Cargo.lock
      - contracts/Move.toml
      - contracts/Move.lock
      - contracts/Published.toml
      - contracts/sources/**
      - contracts/tests/**
      - dapp/app/**
      - dapp/messages/**
      - dapp/next.config.ts
      - dapp/open-next.config.ts
      - dapp/package.json
      - dapp/tsconfig.json
      - infra/aws/**
      - packages/**/package.json
      - packages/**/tsconfig.json
      - packages/**/src/**
      - scripts/**/*.ts
      - scripts/tsconfig.json
      - scripts/aws/README.md
      - nautilus/verifiers/**/package.json
      - nautilus/verifiers/**/tsconfig.json
      - nautilus/verifiers/**/Cargo.toml
      - nautilus/verifiers/**/*.rs
      - nautilus/verifiers/**/*.ts
      - nautilus/verifiers/**/fixtures/**
      - nautilus/verifiers/**/src/testdata/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  SUI_CLI_URL: https://github.com/MystenLabs/sui/releases/download/testnet-v1.71.1/sui-testnet-v1.71.1-ubuntu-x86_64.tgz
  SUI_CLI_SHA256: ca6bc791596d5def88500b653b5db718e72dd0d2b58039ad118f74ef9e6761a5

jobs:
  check:
    name: pnpm and Cargo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          base_ref="FETCH_HEAD"
          changed_files="$RUNNER_TEMP/changed-files.txt"
          git diff --name-only "$base_ref" "$GITHUB_SHA" > "$changed_files"

          has_changes() {
            grep -Eq "$1" "$changed_files"
          }

          if has_changes '^(\.github/workflows/ci\.yml|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|tsconfig\.json|tsconfig\.base\.json|biome\.json|vitest\.config\.ts|dapp/(app/|messages/|next\.config\.ts$|open-next\.config\.ts$|package\.json$|tsconfig\.json$)|infra/aws/|packages/[^/]+/(package\.json$|tsconfig\.json$|src/)|scripts/.*\.ts$|scripts/tsconfig\.json$|scripts/aws/README\.md$|nautilus/verifiers/.*/(package\.json$|tsconfig\.json$|.*\.ts$|fixtures/|src/testdata/))'; then
            echo "typescript=true" >> "$GITHUB_OUTPUT"
          else
            echo "typescript=false" >> "$GITHUB_OUTPUT"
          fi

          if has_changes '^(\.github/workflows/ci\.yml|package\.json|Cargo\.toml|Cargo\.lock|nautilus/verifiers/.*/Cargo\.toml$|nautilus/verifiers/.*\.rs$|nautilus/verifiers/.*/(fixtures/|src/testdata/))'; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

          if has_changes '^(\.github/workflows/ci\.yml|package\.json|pnpm-lock\.yaml|contracts/(Move\.toml$|Move\.lock$|Published\.toml$|sources/|tests/))'; then
            echo "move=true" >> "$GITHUB_OUTPUT"
          else
            echo "move=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.changes.outputs.typescript == 'true' || steps.changes.outputs.move == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Enable pnpm
        if: steps.changes.outputs.typescript == 'true' || steps.changes.outputs.move == 'true'
        run: |
          corepack enable
          corepack prepare pnpm@10.27.0 --activate

      - name: Get pnpm store path
        if: steps.changes.outputs.typescript == 'true' || steps.changes.outputs.move == 'true'
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        if: steps.changes.outputs.typescript == 'true' || steps.changes.outputs.move == 'true'
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Set up Rust
        if: steps.changes.outputs.rust == 'true'
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache Cargo dependencies
        if: steps.changes.outputs.rust == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nautilus/verifiers/earthquake/tee/target
          key: cargo-${{ runner.os }}-${{ hashFiles('nautilus/verifiers/earthquake/tee/Cargo.lock', 'nautilus/verifiers/earthquake/tee/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache Sui CLI artifact
        if: steps.changes.outputs.move == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/sonari/cli-artifacts/sui/${{ env.SUI_CLI_SHA256 }}
          key: sui-cli-${{ runner.os }}-${{ env.SUI_CLI_SHA256 }}

      - name: Install pinned Sui CLI
        if: steps.changes.outputs.move == 'true'
        shell: bash
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/sonari-bin"
          cache_dir="$HOME/.cache/sonari/cli-artifacts/sui/$SUI_CLI_SHA256"
          download_path="$cache_dir/download"
          extract_dir="$RUNNER_TEMP/sui-extract"

          mkdir -p "$install_dir" "$cache_dir" "$extract_dir"
          if [[ ! -f "$download_path" ]]; then
            curl -fsSL "$SUI_CLI_URL" -o "$download_path"
          fi
          printf '%s  %s\n' "$SUI_CLI_SHA256" "$download_path" | sha256sum -c -
          tar -xzf "$download_path" -C "$extract_dir"
          source_path="$(find "$extract_dir" -type f -name sui | head -n 1)"
          if [[ -z "$source_path" || ! -f "$source_path" ]]; then
            echo "Unable to find sui in downloaded Sui CLI artifact" >&2
            exit 1
          fi
          install -m 0755 "$source_path" "$install_dir/sui"
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/sui" --version

      - name: Install dependencies
        if: steps.changes.outputs.typescript == 'true' || steps.changes.outputs.move == 'true'
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript formatting, lint, and types
        if: steps.changes.outputs.typescript == 'true'
        run: pnpm check:ts

      - name: Check Rust formatting and lint
        if: steps.changes.outputs.rust == 'true'
        run: cargo fmt --all --check && cargo clippy --workspace --all-targets -- -D warnings

      - name: Check Move contracts
        if: steps.changes.outputs.move == 'true'
        run: pnpm check:move

      - name: Test TypeScript
        if: steps.changes.outputs.typescript == 'true'
        run: pnpm test

      - name: Test Rust TEE
        if: steps.changes.outputs.rust == 'true'
        run: cargo test --workspace
