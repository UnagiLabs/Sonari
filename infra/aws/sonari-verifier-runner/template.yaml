        Variables:
          VERIFICATION_JOBS_TABLE_NAME: !Ref VerificationJobsTable
          RUNNER_STATE_MACHINE_ARN: !Ref MembershipRunnerStateMachine

  RunnerControlLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: dist/src/runner_workflow.handler
      Role: !GetAtt RunnerControlLambdaRole.Arn
      Timeout: 900
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          EVENTS_TABLE_NAME: !Ref EventsTable
          VERIFICATION_JOBS_TABLE_NAME: !Ref VerificationJobsTable
          RUNNER_LEASE_TABLE_NAME: !Ref RunnerLeaseTable
          RUNNER_ASG_NAME: !Ref RunnerAutoScalingGroup
          RESULT_BUCKET: !Ref RunnerResultBucket
          NITRO_ENCLAVE_PROCESS_COMMAND: !Ref NitroEnclaveProcessCommand
          EARTHQUAKE_NITRO_ENCLAVE_PROCESS_COMMAND: !Ref EarthquakeNitroEnclaveProcessCommand
          MEMBERSHIP_NITRO_ENCLAVE_PROCESS_COMMAND: !Ref MembershipNitroEnclaveProcessCommand
          RELAYER_MODE: !Ref RelayerMode
          RELAYER_NETWORK: !Ref RelayerNetwork
          RELAYER_TARGET: !Ref RelayerTarget
          RELAYER_REGISTRY: !Ref RelayerRegistry
          RELAYER_VERIFIER_REGISTRY: !Ref RelayerVerifierRegistry
          RELAYER_CATEGORY_REGISTRY: !Ref RelayerCategoryRegistry
          RELAYER_CATEGORY_POOL: !Ref RelayerCategoryPool
          RELAYER_GRPC_URL: !Ref RelayerGrpcUrl
          RELAYER_SENDER_ADDRESS: !Ref RelayerSenderAddress
          RELAYER_SIGNER_SECRET_ARN: !Ref RelayerSignerSecretArn
          RELAYER_ALLOW_SUBMIT: !Ref RelayerAllowSubmit
          FLOOR_CENSUS_MODE: !Ref FloorCensusMode
          FLOOR_CENSUS_TARGET: !Ref FloorCensusTarget
          FLOOR_CENSUS_PAUSE_STATE: !Ref FloorCensusPauseState
          FLOOR_CENSUS_CATEGORY_POOL: !Ref FloorCensusCategoryPool
          FLOOR_CENSUS_MAIN_POOL: !Ref FloorCensusMainPool
          FLOOR_CENSUS_JSON_RPC_URL: !Ref FloorCensusJsonRpcUrl
          IDENTITY_RELAYER_MODE: !Ref IdentityRelayerMode
          SONARI_IDENTITY_PACKAGE_ID: !Ref SonariIdentityPackageId
          SONARI_IDENTITY_PAUSE_STATE_ID: !Ref SonariIdentityPauseStateId
          SONARI_IDENTITY_REGISTRY_ID: !Ref SonariIdentityRegistryId
          SONARI_MEMBERSHIP_REGISTRY_ID: !Ref SonariMembershipRegistryId
          SONARI_VERIFIER_REGISTRY_ID: !Ref SonariVerifierRegistryId
          SONARI_SUI_CLOCK_ID: !Ref SonariSuiClockId
          SOURCE_ARCHIVER_URL: !If [HasSourceArchiverConfig, !GetAtt SourceArchiverFunctionUrl.FunctionUrl, ""]
          SOURCE_ARCHIVER_TOKEN_SECRET_ARN: !If [HasSourceArchiverConfig, !Ref SourceArchiverTokenSecretArn, ""]
          AFFECTED_PROOF_REGISTRAR_URL: !If [HasAffectedProofRegistrarConfig, !Ref AffectedProofRegistrarUrl, ""]
          AFFECTED_PROOF_REGISTRAR_TOKEN_SECRET_ARN: !If [HasAffectedProofRegistrarConfig, !Ref AffectedProofRegistrarTokenSecretArn, ""]

  SourceArchiverLambda:
    Type: AWS::Lambda::Function
    Condition: HasSourceArchiverConfig
    Properties:
      Runtime: nodejs22.x
      Handler: dist/src/source_archiver.sourceArchiverHandler
      Role: !GetAtt SourceArchiverLambdaRole.Arn
      Timeout: 240
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          RESULT_BUCKET: !Ref RunnerResultBucket
          SOURCE_ARCHIVER_TOKEN_SECRET_ARN: !Ref SourceArchiverTokenSecretArn
          SOURCE_ARCHIVER_PRIVATE_KEY_SECRET_ARN: !Ref SourceArchiverPrivateKeySecretArn
          SUI_NETWORK: !Ref SourceArchiverSuiNetwork
          SUI_RPC_URL: !Ref SourceArchiverSuiRpcUrl
          WALRUS_UPLOAD_RELAY_URL: !Ref SourceArchiverWalrusUploadRelayUrl
          WALRUS_UPLOAD_RELAY_TIP_MAX_MIST: !Ref SourceArchiverWalrusUploadRelayTipMaxMist
          WALRUS_EPOCHS: !Ref SourceArchiverWalrusEpochs
          WALRUS_DELETABLE: !Ref SourceArchiverWalrusDeletable

  SourceArchiverFunctionUrl:
    Type: AWS::Lambda::Url
    Condition: HasSourceArchiverConfig
    Properties:
      AuthType: NONE
      TargetFunctionArn: !Ref SourceArchiverLambda

  SourceArchiverFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Condition: HasSourceArchiverConfig
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref SourceArchiverLambda
      Principal: "*"
      FunctionUrlAuthType: NONE

  SourceArchiverFunctionInvokeUrlPermission:
    Type: AWS::Lambda::Permission
    Condition: HasSourceArchiverConfig
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SourceArchiverLambda
      Principal: "*"
      InvokedViaFunctionUrl: true

  EarthquakeRunnerStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      RoleArn: !GetAtt RunnerStateMachineRole.Arn
      StateMachineType: STANDARD
      DefinitionString: !Sub |
        {
          "Comment": "Run Sonari earthquake verifier on shared EC2 Nitro Enclave capacity.",
          "StartAt": "StartRouter",
          "States": {
            "StartRouter": {
              "Type": "Choice",
              "Choices": [
                { "And": [
                  { "Variable": "$.action", "IsPresent": true },
                  { "Variable": "$.action", "StringEquals": "register_affected_cells_proof" }
                ], "Next": "RegisterAffectedCellsProofRetry" }
              ],
              "Default": "StartInstance"
            },
            "StartInstance": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "start_instance", "source_event_id.$": "$.source_event_id", "event_revision.$": "$.event_revision", "attempt.$": "$.attempt" },
              "Next": "RunnerCapacityAvailable",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 30, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "RunnerCapacityAvailable": {
              "Type": "Choice",
              "Choices": [
                { "And": [
                  { "Variable": "$.capacity_busy", "IsPresent": true },
                  { "Variable": "$.capacity_busy", "BooleanEquals": true }
                ], "Next": "WaitForSharedRunnerLease" }
              ],
              "Default": "WaitForInstance"
            },
            "WaitForSharedRunnerLease": { "Type": "Wait", "Seconds": 60, "Next": "StartInstance" },
            "WaitForInstance": { "Type": "Wait", "Seconds": 60, "Next": "FindReadyInstance" },
            "FindReadyInstance": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "find_ready_instance", "source_event_id.$": "$.source_event_id", "event_revision.$": "$.event_revision", "attempt.$": "$.attempt" },
              "Next": "DispatchHealthCheckCommand",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 30, "MaxAttempts": 20, "BackoffRate": 1.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "DispatchHealthCheckCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "dispatch_health_check_command", "source_event_id.$": "$.source_event_id", "event_revision.$": "$.event_revision", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id" },
              "ResultSelector": { "verifier_kind.$": "$.verifier_kind", "source_event_id.$": "$.source_event_id", "event_revision.$": "$.event_revision", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count": 0 },
              "Next": "WaitForHealthCheckCommand",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "WaitForHealthCheckCommand": { "Type": "Wait", "Seconds": 30, "Next": "PollHealthCheckCommand" },
            "PollHealthCheckCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "poll_command", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count.$": "$.command_poll_count" },
              "Next": "HealthCheckCommandComplete",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "HealthCheckCommandComplete": {
              "Type": "Choice",
              "Choices": [
                { "Variable": "$.command_status", "StringEquals": "SUCCEEDED", "Next": "ReadHealthCheckResult" },
                { "Variable": "$.command_status", "StringEquals": "FAILED", "Next": "MarkFailed" },
                { "Variable": "$.command_poll_count", "NumericGreaterThanEquals": 60, "Next": "MarkCommandPollingTimedOut" }
              ],
              "Default": "WaitForHealthCheckCommand"
            },
            "ReadHealthCheckResult": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "read_health_check_result", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "ResultPath": "$.health_check_result",
              "Next": "DispatchGetAttestationCommand",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "DispatchGetAttestationCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "dispatch_get_attestation_command", "source_event_id.$": "$.source_event_id", "event_revision.$": "$.event_revision", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id" },
              "ResultSelector": { "verifier_kind.$": "$.verifier_kind", "source_event_id.$": "$.source_event_id", "event_revision.$": "$.event_revision", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count": 0 },
              "Next": "WaitForAttestationCommand",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "WaitForAttestationCommand": { "Type": "Wait", "Seconds": 30, "Next": "PollAttestationCommand" },
            "PollAttestationCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "poll_command", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count.$": "$.command_poll_count" },
              "Next": "AttestationCommandComplete",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "AttestationCommandComplete": {
              "Type": "Choice",
              "Choices": [
                { "Variable": "$.command_status", "StringEquals": "SUCCEEDED", "Next": "ReadAttestationResult" },
                { "Variable": "$.command_status", "StringEquals": "FAILED", "Next": "MarkFailed" },
                { "Variable": "$.command_poll_count", "NumericGreaterThanEquals": 60, "Next": "MarkCommandPollingTimedOut" }
              ],
              "Default": "WaitForAttestationCommand"
            },
            "ReadAttestationResult": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "read_attestation_result", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "ResultPath": "$.attestation_result",
              "Next": "RegisterEnclaveInstance",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "RegisterEnclaveInstance": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "register_enclave_instance", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "attestation.$": "$.attestation_result.attestation" },
              "ResultPath": "$.registration_result",
              "Next": "DispatchProcessDataCommand",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "DispatchProcessDataCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "dispatch_process_data_command", "source_event_id.$": "$.source_event_id", "event_revision.$": "$.event_revision", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "registration_metadata.$": "$.registration_result.registration_metadata" },
              "ResultSelector": { "verifier_kind.$": "$.verifier_kind", "source_event_id.$": "$.source_event_id", "event_revision.$": "$.event_revision", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count": 0 },
              "Next": "WaitForCommand",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "WaitForCommand": { "Type": "Wait", "Seconds": 30, "Next": "PollCommand" },
            "PollCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "poll_command", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count.$": "$.command_poll_count" },
              "Next": "CommandComplete",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "CommandComplete": {
              "Type": "Choice",
              "Choices": [
                { "Variable": "$.command_status", "StringEquals": "SUCCEEDED", "Next": "ReadResult" },
                { "Variable": "$.command_status", "StringEquals": "FAILED", "Next": "MarkFailed" },
                { "Variable": "$.command_poll_count", "NumericGreaterThanEquals": 60, "Next": "MarkCommandPollingTimedOut" }
              ],
              "Default": "WaitForCommand"
            },
            "ReadResult": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "read_result", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "Next": "ApplyResult",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "ApplyResult": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "apply_result", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "Next": "ArchiveSources",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "ArchiveSources": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "archive_sources", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "Next": "RegisterAffectedCellsProof",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "RegisterAffectedCellsProof": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "register_affected_cells_proof", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "Next": "RelayerPreviewOrDryRun",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "RelayerPreviewOrDryRun" }]
            },
            "RegisterAffectedCellsProofRetry": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "register_affected_cells_proof", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "End": true,
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "RestoreAffectedCellsProofRegistrationRetry" }]
            },
            "RestoreAffectedCellsProofRegistrationRetry": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "restore_affected_cells_proof_registration_retry", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "message.$": "$.error.Cause" },
              "Next": "ProofRegistrationRetryComplete",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.restore_error", "Next": "ProofRegistrationRetryComplete" }]
            },
            "ProofRegistrationRetryComplete": {
              "Type": "Succeed"
            },
            "RelayerPreviewOrDryRun": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "relayer_preview_or_dry_run", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "Next": "RelayerResultComplete",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "StopInstance" }]
            },
            "RelayerResultComplete": {
              "Type": "Choice",
              "Choices": [
                { "Variable": "$.relayer", "StringEquals": "succeeded", "Next": "RecordRelayerSuccess" }
              ],
              "Default": "StopInstance"
            },
            "RecordRelayerSuccess": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "record_relayer_success", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key", "relayer_success.$": "$.relayer_success" },
              "Next": "RunFloorCensus",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 8, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "StopInstance" }]
            },
            "RunFloorCensus": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "run_floor_census", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key", "relayer_success.$": "$.relayer_success" },
              "Next": "StopInstance",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 30, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "StopInstance" }]
            },
            "MarkFailed": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "mark_failed", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt" },
              "Next": "StopInstance",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "StopInstance" }]
            },
            "MarkCommandPollingTimedOut": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "mark_failed", "source_event_id.$": "$.source_event_id", "attempt.$": "$.attempt", "error_code": "AWS_RUNNER_TIMEOUT", "message": "SSM command polling exceeded 30 minutes" },
              "Next": "StopInstance",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "StopInstance" }]
            },
            "StopInstance": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "stop_instance", "source_event_id.$": "$.source_event_id", "event_revision.$": "$.event_revision", "attempt.$": "$.attempt" },
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 30, "MaxAttempts": 8, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.stop_error", "Next": "StopInstanceFailed" }],
              "End": true
            },
            "StopInstanceFailed": {
              "Type": "Fail",
              "Error": "StopInstanceFailed",
              "Cause": "Runner cleanup failed after retrying StopInstance"
            }
          }
        }

  MembershipRunnerStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      RoleArn: !GetAtt RunnerStateMachineRole.Arn
      StateMachineType: STANDARD
      DefinitionString: !Sub |
        {
          "Comment": "Run Sonari membership identity verifier on shared EC2 Nitro Enclave capacity.",
          "StartAt": "StartInstance",
          "States": {
            "StartInstance": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "start_instance", "job_id.$": "$.job_id", "attempt.$": "$.attempt" },
              "Next": "RunnerCapacityAvailable",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 30, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "RunnerCapacityAvailable": {
              "Type": "Choice",
              "Choices": [
                { "And": [
                  { "Variable": "$.capacity_busy", "IsPresent": true },
                  { "Variable": "$.capacity_busy", "BooleanEquals": true }
                ], "Next": "WaitForSharedRunnerLease" }
              ],
              "Default": "WaitForInstance"
            },
            "WaitForSharedRunnerLease": { "Type": "Wait", "Seconds": 60, "Next": "StartInstance" },
            "WaitForInstance": { "Type": "Wait", "Seconds": 60, "Next": "FindReadyInstance" },
            "FindReadyInstance": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "find_ready_instance", "job_id.$": "$.job_id", "attempt.$": "$.attempt" },
              "Next": "DispatchGetAttestationCommand",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 30, "MaxAttempts": 20, "BackoffRate": 1.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "DispatchGetAttestationCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "dispatch_get_attestation_command", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id" },
              "ResultSelector": { "verifier_kind.$": "$.verifier_kind", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count": 0 },
              "Next": "WaitForAttestationCommand",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "WaitForAttestationCommand": { "Type": "Wait", "Seconds": 30, "Next": "PollAttestationCommand" },
            "PollAttestationCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "poll_command", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count.$": "$.command_poll_count" },
              "Next": "AttestationCommandComplete",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "AttestationCommandComplete": {
              "Type": "Choice",
              "Choices": [
                { "Variable": "$.command_status", "StringEquals": "SUCCEEDED", "Next": "ReadAttestationResult" },
                { "Variable": "$.command_status", "StringEquals": "FAILED", "Next": "MarkFailed" },
                { "Variable": "$.command_poll_count", "NumericGreaterThanEquals": 60, "Next": "MarkCommandPollingTimedOut" }
              ],
              "Default": "WaitForAttestationCommand"
            },
            "ReadAttestationResult": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "read_attestation_result", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "ResultPath": "$.attestation_result",
              "Next": "RegisterEnclaveInstance",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "RegisterEnclaveInstance": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "register_enclave_instance", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "attestation.$": "$.attestation_result.attestation" },
              "ResultPath": "$.registration_result",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Next": "DispatchProcessDataCommand",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "DispatchProcessDataCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "dispatch_process_data_command", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "registration_metadata.$": "$.registration_result.registration_metadata" },
              "ResultSelector": { "verifier_kind.$": "$.verifier_kind", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count": 0 },
              "Next": "WaitForCommand",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "WaitForCommand": { "Type": "Wait", "Seconds": 30, "Next": "PollCommand" },
            "PollCommand": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "poll_command", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "instance_id.$": "$.instance_id", "command_id.$": "$.command_id", "result_s3_key.$": "$.result_s3_key", "command_poll_count.$": "$.command_poll_count" },
              "Next": "CommandComplete",
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 5, "MaxAttempts": 3, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "CommandComplete": {
              "Type": "Choice",
              "Choices": [
                { "Variable": "$.command_status", "StringEquals": "SUCCEEDED", "Next": "ReadResult" },
                { "Variable": "$.command_status", "StringEquals": "FAILED", "Next": "MarkFailed" },
                { "Variable": "$.command_poll_count", "NumericGreaterThanEquals": 60, "Next": "MarkCommandPollingTimedOut" }
              ],
              "Default": "WaitForCommand"
            },
            "ReadResult": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "read_result", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "result_s3_key.$": "$.result_s3_key" },
              "Next": "DryRunSuiSubmission",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "DryRunSuiSubmission": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "dry_run_sui_submission", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "result.$": "$.result" },
              "Next": "DryRunSuiSubmissionComplete",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "DryRunSuiSubmissionComplete": {
              "Type": "Choice",
              "Choices": [
                { "Variable": "$.sui_submission", "StringEquals": "failed", "Next": "StopInstance" },
                { "Variable": "$.sui_submission", "StringEquals": "succeeded", "Next": "SubmitSuiSubmission" }
              ],
              "Default": "ApplyResult"
            },
            "SubmitSuiSubmission": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "submit_sui_submission", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "result.$": "$.result" },
              "Next": "StopInstance",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "ApplyResult": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "apply_result", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "result.$": "$.result" },
              "Next": "StopInstance",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "MarkFailed" }]
            },
            "MarkFailed": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "mark_failed", "job_id.$": "$.job_id", "attempt.$": "$.attempt" },
              "Next": "StopInstance",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "StopInstance" }]
            },
            "MarkCommandPollingTimedOut": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "mark_failed", "job_id.$": "$.job_id", "attempt.$": "$.attempt", "error_code": "AWS_MEMBERSHIP_RUNNER_TIMEOUT", "message": "SSM command polling exceeded 30 minutes" },
              "Next": "StopInstance",
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.error", "Next": "StopInstance" }]
            },
            "StopInstance": {
              "Type": "Task",
              "Resource": "${RunnerControlLambda.Arn}",
              "Parameters": { "verifier_kind.$": "$.verifier_kind", "action": "stop_instance", "job_id.$": "$.job_id", "attempt.$": "$.attempt" },
              "Retry": [{ "ErrorEquals": ["States.ALL"], "IntervalSeconds": 30, "MaxAttempts": 8, "BackoffRate": 2.0 }],
              "Catch": [{ "ErrorEquals": ["States.ALL"], "ResultPath": "$.stop_error", "Next": "StopInstanceFailed" }],
              "End": true
            },
            "StopInstanceFailed": {
              "Type": "Fail",
              "Error": "StopInstanceFailed",
              "Cause": "Membership identity runner cleanup failed after retrying StopInstance"
            }
          }
        }

  WatcherSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      ScheduleExpression: !Ref ScheduleExpression
      ScheduleExpressionTimezone: Asia/Tokyo
      State: !Ref ScheduleState
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt WatcherLambda.Arn
        RoleArn: !GetAtt WatcherScheduleRole.Arn
        Input: '{"verifier_kind": "earthquake"}'

  BatchSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      ScheduleExpression: !Ref MembershipScheduleExpression
      State: !Ref ScheduleState
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt BatchVerifierLambda.Arn
        RoleArn: !GetAtt BatchScheduleRole.Arn
        Input: '{"verifier_kind": "membership_identity"}'

  MembershipJobStreamDlq:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  MembershipJobStreamLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MembershipJobStreamAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt VerificationJobsTable.StreamArn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt VerificationJobsTable.Arn
              - Effect: Allow
                Action: states:StartExecution
                Resource: !Ref MembershipRunnerStateMachine
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt MembershipJobStreamDlq.Arn

  MembershipJobStreamLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: dist/src/lambda.jobStreamHandler
      Role: !GetAtt MembershipJobStreamLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          VERIFICATION_JOBS_TABLE_NAME: !Ref VerificationJobsTable
          RUNNER_STATE_MACHINE_ARN: !Ref MembershipRunnerStateMachine

  MembershipJobStreamEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt VerificationJobsTable.StreamArn
      FunctionName: !Ref MembershipJobStreamLambda
      StartingPosition: LATEST
      MaximumBatchingWindowInSeconds: 1
      BisectBatchOnFunctionError: true
      MaximumRetryAttempts: 5
      MaximumRecordAgeInSeconds: 3600
      DestinationConfig:
        OnFailure:
          Destination: !GetAtt MembershipJobStreamDlq.Arn
      FilterCriteria:
        Filters:
          - Pattern: '{"eventName":["INSERT","MODIFY"],"dynamodb":{"NewImage":{"status":{"S":["queued","retry"]}}}}'

Outputs:
  EventsTableName:
    Value: !Ref EventsTable
  VerificationJobsTableName:
    Value: !Ref VerificationJobsTable
  RunnerLeaseTableName:
    Value: !Ref RunnerLeaseTable
  RunnerResultBucketName:
    Value: !Ref RunnerResultBucket
  RunnerLogGroupName:
    Value: !Ref RunnerLogGroup
  DeployedGitCommitSha:
    Value: !Ref GitCommitSha
  LambdaCodeS3KeyOutput:
    Value: !Ref LambdaCodeS3Key
  TeeArtifactS3KeyOutput:
    Value: !Ref TeeArtifactS3Key
  TeeArtifactSha256Output:
    Value: !Ref TeeArtifactSha256
  EarthquakeTeeEifS3KeyOutput:
    Value: !Ref EarthquakeTeeEifS3Key
  EarthquakeTeeEifSha256Output:
    Value: !Ref EarthquakeTeeEifSha256
  MembershipTeeArtifactS3KeyOutput:
    Value: !Ref MembershipTeeArtifactS3Key
  MembershipTeeArtifactSha256Output:
    Value: !Ref MembershipTeeArtifactSha256
  TeeEifS3KeyOutput:
    Value: !Ref TeeEifS3Key
  TeeEifSha256Output:
    Value: !Ref TeeEifSha256
  EarthquakeRunnerStateMachineArn:
    Value: !Ref EarthquakeRunnerStateMachine
  MembershipRunnerStateMachineArn:
    Value: !Ref MembershipRunnerStateMachine
  RunnerAutoScalingGroupName:
    Value: !Ref RunnerAutoScalingGroup
  RunnerLaunchTemplateId:
    Value: !Ref RunnerLaunchTemplate
  RunnerRoleArn:
    Value: !GetAtt RunnerRole.Arn
  WatcherScheduleName:
    Value: !Ref WatcherSchedule
  BatchScheduleName:
    Value: !Ref BatchSchedule
  WatcherLambdaName:
    Value: !Ref WatcherLambda
  ManualWatcherLambdaName:
    Value: !Ref ManualWatcherLambda
  SubmitVerificationLambdaName:
    Value: !Ref SubmitVerificationLambda
  SubmitVerificationFunctionUrlOutput:
    Value: !GetAtt SubmitVerificationFunctionUrl.FunctionUrl
  IdentityStatusLambdaName:
    Value: !Ref IdentityStatusLambda
  IdentityStatusFunctionUrlOutput:
    Value: !GetAtt IdentityStatusFunctionUrl.FunctionUrl
  BatchVerifierLambdaName:
    Value: !Ref BatchVerifierLambda
  MembershipJobStreamLambdaName:
    Value: !Ref MembershipJobStreamLambda
  MembershipJobStreamDlqUrl:
    Value: !Ref MembershipJobStreamDlq
  RunnerControlLambdaName:
    Value: !Ref RunnerControlLambda
  SourceArchiverLambdaName:
    Condition: HasSourceArchiverConfig
    Value: !Ref SourceArchiverLambda
  SourceArchiverFunctionUrlOutput:
    Condition: HasSourceArchiverConfig
    Value: !GetAtt SourceArchiverFunctionUrl.FunctionUrl
  SigningMaterialKmsKeyId:
    Value: !Ref SigningMaterialKmsKey
