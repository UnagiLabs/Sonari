  RunnerControlLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ControlSharedVerifierRunner
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - autoscaling:SetDesiredCapacity
                  - autoscaling:DescribeAutoScalingGroups
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ssm:DescribeInstanceInformation
                Resource: "*"
              - Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/*
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}::document/AWS-RunShellScript
              - Effect: Allow
                Action: ssm:GetCommandInvocation
                Resource: "*"
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub ${RunnerResultBucket.Arn}/results/*
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub ${RunnerResultBucket.Arn}/source-artifacts/*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt EventsTable.Arn
                  - !GetAtt VerificationJobsTable.Arn
                  - !GetAtt RunnerLeaseTable.Arn
              - !If
                - HasRelayerSignerSecretArn
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !Ref RelayerSignerSecretArn
                - !Ref AWS::NoValue
              - !If
                - HasSourceArchiverConfig
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !Ref SourceArchiverTokenSecretArn
                - !Ref AWS::NoValue
              - !If
                - HasAffectedProofRegistrarConfig
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !Ref AffectedProofRegistrarTokenSecretArn
                - !Ref AWS::NoValue

