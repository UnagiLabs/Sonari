[dependencies]
# USDC は network ごとに publish 済みアドレスが異なる Circle 公式 USDC。
# addr_subst は publish 対象 network の値に揃える（dapp 側は donate-config.ts の
# USDC_TYPE_BY_NETWORK で network 分岐）。
#   testnet: 0xa1ec7fc00a6f40db9693ad1415d0c193ad3906494428cf252621037bd7117e29
#   mainnet: 0xdba34672e30cb065b1f93e3ab55318768fd6fef66c15942c9f7cb846e2f900e7
usdc = { git = "https://github.com/circlefin/stablecoin-sui.git", subdir = "packages/usdc", rev = "d0904aec1bbe46b38f811654070032363a5a2966", addr_subst = { usdc = "0xa1ec7fc00a6f40db9693ad1415d0c193ad3906494428cf252621037bd7117e29" } }

